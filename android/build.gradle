buildscript {
   ext {
        buildToolsVersion = "36.0.0" // ३६ करा
        minSdkVersion = 24
        compileSdkVersion = 36      // ३६ करा
        targetSdkVersion = 36       // ३६ करा
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"

allprojects {
    repositories {
        // मॅन्युअल पाथ सेटिंग्ज ज्यामुळे async-storage एरर येणार नाही
        maven {
            url "$rootDir/../node_modules/react-native/android"
        }
        maven {
            url "$rootDir/../node_modules/@react-native-async-storage/async-storage/android"
        }
        
        mavenLocal()
        google()
        mavenCentral()
        maven { url 'https://www.jitpack.io' }
    }
}